services:

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: kostrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kostrack
      POSTGRES_USER: kostrack
      POSTGRES_PASSWORD: ${TSDB_PASSWORD:-changeme}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kostrack -d kostrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: kostrack-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
      # Pass DB connection through to Grafana provisioning
      TSDB_HOST: timescaledb
      TSDB_PORT: 5432
      TSDB_DB: kostrack
      TSDB_USER: kostrack
      TSDB_PASSWORD: ${TSDB_PASSWORD:-changeme}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy


  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kostrack-api
    restart: unless-stopped
    environment:
      KOSTRACK_DSN: postgresql://kostrack:${TSDB_PASSWORD:-changeme}@timescaledb:5432/kostrack
      KOSTRACK_API_KEY: ${KOSTRACK_API_KEY:-}
      KOSTRACK_SERVICE_ID: api
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
volumes:
  timescale-data:
  grafana-data: