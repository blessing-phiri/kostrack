apiVersion: 1

datasources:
  - name: kostrack
    type: postgres
    uid: kostrack-tsdb
    url: ${TSDB_HOST}:${TSDB_PORT}
    database: ${TSDB_DB}
    user: ${TSDB_USER}
    secureJsonData:
      password: ${TSDB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    isDefault: true
    editable: false